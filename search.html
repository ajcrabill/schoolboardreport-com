---
layout: page
title: "Search"
---

  <!-- SEARCH SECTION -->
  <section class="search-section">
    <div class="container">
      <div class="page-label">Search</div>
      <h1 class="search-headline">Search School Board Report</h1>

      <div class="search-bar">
        <div class="search-bar-icon">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <input
          type="text"
          id="search-input"
          placeholder="Search articles..."
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <div class="results-meta" id="results-meta"></div>

      <div id="results"></div>
    </div>
  </section>

  <script>
    const articles = [
      { title: "When Boards Vote on Curriculum, Students Pay the Price", url: "/analysis/curriculum-governance-overreach.html", date: "June 16, 2026", category: "Analysis", summary: "Three districts last month voted on specific curriculum materials rather than setting curricular standards and delegating implementation to staff." },
      { title: "The Superintendent Who Resigned Because the Board 'Helped Too Much'", url: "/analysis/superintendent-resignation-governance.html", date: "June 14, 2026", category: "Governance-Management", summary: "What this week's high-profile resignation reveals about the boundary between governance and management." },
      { title: "State Board Mandates Outcome Monitoring Requirements", url: "/analysis/state-board-outcome-monitoring.html", date: "June 11, 2026", category: "Policy", summary: "When state boards mandate outcome monitoring, local boards often comply procedurally but miss the spirit — treating it as a reporting exercise rather than genuinely using data." },
      { title: "Three Districts, Three Different Approaches to the Same Governance Challenge", url: "/analysis/three-districts-same-challenge.html", date: "June 9, 2026", category: "Analysis", summary: "Houston ISD, Jefferson County CO, and Wake County NC each faced the same governance-management boundary challenge — with three very different outcomes." },
      { title: "Why Board Oversight of the Superintendent Is Not the Same as Board Interference", url: "/analysis/oversight-not-interference.html", date: "June 6, 2026", category: "Governance", summary: "Oversight means monitoring outcomes and holding the superintendent accountable. Interference means telling the superintendent how to do the job. Most boards conflate the two." },
      { title: "The Quiet Pattern Behind Boards That Overstep", url: "/analysis/quiet-pattern-boards-overstep.html", date: "June 4, 2026", category: "Board Accountability", summary: "Board overreach rarely starts big. It starts with small procedural violations that escalate over time — and research documents the warning signs." },
      { title: "Superintendent Accountability Requires More Than Annual Evaluations", url: "/analysis/superintendent-accountability-evaluations.html", date: "June 2, 2026", category: "Superintendent Watch", summary: "Many boards evaluate on compliance metrics rather than outcome metrics. Effective boards monitor against goals quarterly, with the annual evaluation as a summary." },
      { title: "Districts That Monitor Student Outcomes Outperform Those That Don't", url: "/analysis/outcome-monitoring-performance.html", date: "May 30, 2026", category: "Data & Outcomes", summary: "Research from RAND, Marzano & Waters, and Kenneth Leithwood consistently finds that boards focused on outcomes are associated with better student performance." }
    ];

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function renderResults(filtered, query) {
      const resultsEl = document.getElementById('results');
      const metaEl = document.getElementById('results-meta');

      if (filtered.length === 0 && query.length > 0) {
        metaEl.textContent = '';
        resultsEl.innerHTML = '<div class="no-results"><div class="no-results-title">No articles found.</div><div class="no-results-body">Try different keywords or browse by section using the navigation above.</div></div>';
        return;
      }

      if (query.length === 0) {
        metaEl.textContent = 'Showing all ' + articles.length + ' articles';
      } else {
        metaEl.textContent = filtered.length + ' article' + (filtered.length !== 1 ? 's' : '') + ' matching "' + escapeHtml(query) + '"';
      }

      resultsEl.innerHTML = filtered.map(function(article) {
        return '<div class="result-card">' +
          '<a href="' + escapeHtml(article.url) + '">' +
            '<div class="result-meta">' +
              '<span class="category-chip">' + escapeHtml(article.category) + '</span>' +
              '<span class="result-date">' + escapeHtml(article.date) + '</span>' +
            '</div>' +
            '<div class="result-title">' + escapeHtml(article.title) + '</div>' +
          '</a>' +
          '<p class="result-summary">' + escapeHtml(article.summary) + '</p>' +
          '<a href="' + escapeHtml(article.url) + '" class="result-link">Read More →</a>' +
        '</div>';
      }).join('');
    }

    function filterArticles(query) {
      if (!query) return articles;
      var q = query.toLowerCase();
      return articles.filter(function(a) {
        return (
          a.title.toLowerCase().includes(q) ||
          a.summary.toLowerCase().includes(q) ||
          a.category.toLowerCase().includes(q)
        );
      });
    }

    var searchInput = document.getElementById('search-input');

    searchInput.addEventListener('keyup', function() {
      var query = searchInput.value.trim();
      renderResults(filterArticles(query), query);
    });

    // Show all articles on load
    renderResults(articles, '');

    // Focus the input on load
    searchInput.focus();
  </script>
