<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search — School Board Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,400;0,600;0,800;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1B3A6B;
      --red: #CC2936;
      --white: #FFFFFF;
      --bg-secondary: #F5F5F5;
      --text-primary: #1A1A1A;
      --text-secondary: #555555;
      --text-muted: #888888;
      --rule: #DDDDDD;
      --rule-dark: #CCCCCC;
    }

    body {
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 400;
      color: var(--text-primary);
      background: var(--white);
      font-size: 16px;
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }

    /* ── MASTHEAD ── */
    .masthead-top-rule {
      background: var(--red);
      height: 3px;
    }

    .masthead {
      background: var(--white);
      padding: 18px 0 0;
      text-align: center;
    }

    .masthead-title {
      font-size: 2rem;
      font-weight: 800;
      color: var(--navy);
      letter-spacing: -0.01em;
      line-height: 1;
    }

    .masthead-rule {
      border: none;
      border-top: 1px solid var(--rule);
      margin: 14px 0 10px;
    }

    .masthead-date {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    /* ── NAV ── */
    .masthead-nav {
      margin-top: 12px;
      padding: 10px 0;
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
    }

    .masthead-nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 32px;
    }

    .masthead-nav a {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-primary);
      transition: color 0.15s;
    }

    .masthead-nav a:hover { color: var(--red); }

    .nav-search {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--red);
    }

    .nav-search svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── OUTER CONTAINER ── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── SEARCH SECTION ── */
    .search-section {
      padding: 52px 0 64px;
    }

    .page-label {
      display: inline-block;
      background: var(--red);
      color: var(--white);
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 3px 8px;
      margin-bottom: 16px;
    }

    .search-headline {
      font-size: 2rem;
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 24px;
    }

    /* ── SEARCH INPUT ── */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 0;
      border: 2px solid var(--navy);
      max-width: 640px;
      margin-bottom: 12px;
      transition: box-shadow 0.15s;
    }

    .search-bar:focus-within {
      box-shadow: 0 0 0 3px rgba(27,58,107,0.12);
    }

    .search-bar-icon {
      padding: 0 14px;
      display: flex;
      align-items: center;
      color: var(--navy);
      flex-shrink: 0;
    }

    .search-bar-icon svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    #search-input {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      color: var(--text-primary);
      background: transparent;
      border: none;
      outline: none;
      padding: 13px 14px 13px 0;
      flex: 1;
      min-width: 0;
    }

    #search-input::placeholder {
      color: var(--text-muted);
    }

    .results-meta {
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.02em;
      margin-bottom: 28px;
      min-height: 1.2em;
    }

    /* ── RESULTS ── */
    #results {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .result-card {
      padding: 24px 0;
      border-bottom: 1px solid var(--rule);
    }

    .result-card:first-child {
      border-top: 2px solid var(--text-primary);
    }

    .result-card:last-child {
      border-bottom: 1px solid var(--rule);
    }

    .result-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .category-chip {
      display: inline-block;
      background: var(--red);
      color: var(--white);
      font-size: 0.6rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 2px 7px;
    }

    .result-date {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .result-title {
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1.25;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
      transition: color 0.15s;
    }

    .result-card a:hover .result-title {
      color: var(--red);
    }

    .result-summary {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.65;
      margin-bottom: 12px;
      max-width: 700px;
    }

    .result-link {
      font-size: 0.8rem;
      font-weight: 800;
      color: var(--navy);
      letter-spacing: 0.04em;
      border-bottom: 2px solid var(--navy);
      padding-bottom: 1px;
      transition: color 0.15s, border-color 0.15s;
    }

    .result-link:hover {
      color: var(--red);
      border-color: var(--red);
    }

    .no-results {
      padding: 40px 0;
      border-top: 2px solid var(--text-primary);
    }

    .no-results-title {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .no-results-body {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    /* ── FOOTER ── */
    footer {
      background: var(--navy);
      padding: 0;
    }

    .footer-red-rule {
      background: var(--red);
      height: 3px;
    }

    .footer-inner {
      padding: 28px 24px;
      text-align: center;
    }

    .footer-masthead {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }

    .footer-copy {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.02em;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 800px) {
      .masthead-title { font-size: 1.5rem; }
      .masthead-nav ul { gap: 18px; flex-wrap: wrap; }
      .search-headline { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- MASTHEAD -->
  <div class="masthead-top-rule"></div>

  <header class="masthead">
    <div class="container">
      <a href="/"><div class="masthead-title">School Board Report</div></a>
      <hr class="masthead-rule" />
      <div class="masthead-date">Friday, June 20, 2026</div>
    </div>
    <nav class="masthead-nav">
      <ul>
        <li><a href="/analysis.html">Analysis</a></li>
        <li><a href="/districts.html">Districts</a></li>
        <li><a href="/about.html">About</a></li>
        <li><a href="/contact.html">Contact</a></li>
        <li>
          <a href="/search.html" class="nav-search">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </a>
        </li>
      </ul>
    </nav>
  </header>

  <!-- SEARCH SECTION -->
  <section class="search-section">
    <div class="container">
      <div class="page-label">Search</div>
      <h1 class="search-headline">Search School Board Report</h1>

      <div class="search-bar">
        <div class="search-bar-icon">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <input
          type="text"
          id="search-input"
          placeholder="Search articles..."
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <div class="results-meta" id="results-meta"></div>

      <div id="results"></div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="footer-red-rule"></div>
    <div class="footer-inner">
      <div class="footer-masthead">School Board Report</div>
      <div class="footer-copy">© 2026 School Board Report — Governance analysis that matters</div>
    </div>
  </footer>

  <script>
    const articles = [
      { title: "When Boards Vote on Curriculum, Students Pay the Price", url: "/analysis/curriculum-governance-overreach.html", date: "June 16, 2026", category: "Analysis", summary: "Three districts last month voted on specific curriculum materials rather than setting curricular standards and delegating implementation to staff." },
      { title: "The Superintendent Who Resigned Because the Board 'Helped Too Much'", url: "/analysis/superintendent-resignation-governance.html", date: "June 14, 2026", category: "Governance-Management", summary: "What this week's high-profile resignation reveals about the boundary between governance and management." },
      { title: "State Board Mandates Outcome Monitoring Requirements", url: "/analysis/state-board-outcome-monitoring.html", date: "June 11, 2026", category: "Policy", summary: "When state boards mandate outcome monitoring, local boards often comply procedurally but miss the spirit — treating it as a reporting exercise rather than genuinely using data." },
      { title: "Three Districts, Three Different Approaches to the Same Governance Challenge", url: "/analysis/three-districts-same-challenge.html", date: "June 9, 2026", category: "Analysis", summary: "Houston ISD, Jefferson County CO, and Wake County NC each faced the same governance-management boundary challenge — with three very different outcomes." },
      { title: "Why Board Oversight of the Superintendent Is Not the Same as Board Interference", url: "/analysis/oversight-not-interference.html", date: "June 6, 2026", category: "Governance", summary: "Oversight means monitoring outcomes and holding the superintendent accountable. Interference means telling the superintendent how to do the job. Most boards conflate the two." },
      { title: "The Quiet Pattern Behind Boards That Overstep", url: "/analysis/quiet-pattern-boards-overstep.html", date: "June 4, 2026", category: "Board Accountability", summary: "Board overreach rarely starts big. It starts with small procedural violations that escalate over time — and research documents the warning signs." },
      { title: "Superintendent Accountability Requires More Than Annual Evaluations", url: "/analysis/superintendent-accountability-evaluations.html", date: "June 2, 2026", category: "Superintendent Watch", summary: "Many boards evaluate on compliance metrics rather than outcome metrics. Effective boards monitor against goals quarterly, with the annual evaluation as a summary." },
      { title: "Districts That Monitor Student Outcomes Outperform Those That Don't", url: "/analysis/outcome-monitoring-performance.html", date: "May 30, 2026", category: "Data & Outcomes", summary: "Research from RAND, Marzano & Waters, and Kenneth Leithwood consistently finds that boards focused on outcomes are associated with better student performance." }
    ];

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function renderResults(filtered, query) {
      const resultsEl = document.getElementById('results');
      const metaEl = document.getElementById('results-meta');

      if (filtered.length === 0 && query.length > 0) {
        metaEl.textContent = '';
        resultsEl.innerHTML = '<div class="no-results"><div class="no-results-title">No articles found.</div><div class="no-results-body">Try different keywords or browse by section using the navigation above.</div></div>';
        return;
      }

      if (query.length === 0) {
        metaEl.textContent = 'Showing all ' + articles.length + ' articles';
      } else {
        metaEl.textContent = filtered.length + ' article' + (filtered.length !== 1 ? 's' : '') + ' matching “' + escapeHtml(query) + '”';
      }

      resultsEl.innerHTML = filtered.map(function(article) {
        return '<div class="result-card">' +
          '<a href="' + escapeHtml(article.url) + '">' +
            '<div class="result-meta">' +
              '<span class="category-chip">' + escapeHtml(article.category) + '</span>' +
              '<span class="result-date">' + escapeHtml(article.date) + '</span>' +
            '</div>' +
            '<div class="result-title">' + escapeHtml(article.title) + '</div>' +
          '</a>' +
          '<p class="result-summary">' + escapeHtml(article.summary) + '</p>' +
          '<a href="' + escapeHtml(article.url) + '" class="result-link">Read More →</a>' +
        '</div>';
      }).join('');
    }

    function filterArticles(query) {
      if (!query) return articles;
      var q = query.toLowerCase();
      return articles.filter(function(a) {
        return (
          a.title.toLowerCase().includes(q) ||
          a.summary.toLowerCase().includes(q) ||
          a.category.toLowerCase().includes(q)
        );
      });
    }

    var searchInput = document.getElementById('search-input');

    searchInput.addEventListener('keyup', function() {
      var query = searchInput.value.trim();
      renderResults(filterArticles(query), query);
    });

    // Show all articles on load
    renderResults(articles, '');

    // Focus the input on load
    searchInput.focus();
  </script>

</body>
</html>
